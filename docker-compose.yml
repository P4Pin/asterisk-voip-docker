services:
  asterisk:
    build: .
    container_name: asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./config/voicemail.conf:/etc/asterisk/voicemail.conf:ro
      - ./config/modules.conf:/etc/asterisk/modules.conf:ro
      - asterisk-spool:/var/spool/asterisk
      - asterisk-log:/var/log/asterisk

volumes:
  asterisk-spool:
  asterisk-log: